services:
  - type: web
    name: smartmatrix-bmp-backend
    env: node
    plan: standard
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        scope: project
      - key: DATABASE_URL
        scope: project
      - key: BASE_URL
        scope: project
      - key: GOOGLE_API_KEY
        scope: project
      - key: GOOGLE_ADDRESS_VALIDATION_API_KEY
        scope: project
      - key: GOOGLE_ROUTES_API
        scope: project
      - key: GOOGLE_DISTANCE_MATRIX_API
        scope: project
      - key: GOOGLE_GEOCODING_API
        scope: project
      - key: GOOGLE_GEOLOCATION_KEY
        scope: project
      - key: RAZORPAY_KEY_ID
        scope: project
      - key: RAZORPAY_KEY_SECRET
        scope: project
      - key: TWILIO_ACCOUNT_SID
        scope: project
      - key: TWILIO_AUTH_TOKEN
        scope: project
      - key: TWILIO_PHONE_NUMBER
        scope: project
      - key: TWILIO_SMS_ENABLED
        value: false
        scope: project
      - key: OTP_LENGTH
        value: 4
      - key: OTP_MAX_ATTEMPTS
        value: 3
      - key: OTP_EXPIRY_MINUTES
        value: 30
      - key: OTP_LOCKOUT_MINUTES
        value: 15
      - key: TEST_PHONE_NUMBER
        value: 9767996768
      - key: FIREBASE_PROJECT_ID
        scope: project
      - key: FIREBASE_PRIVATE_KEY
        scope: project
      - key: FIREBASE_CLIENT_EMAIL
        scope: project
    healthCheckPath: /api/health
    autoScrollLogs: false

databases:
  - name: smartmatrix-bmp-db
    plan: standard
    databaseName: postgres
    user: postgres
